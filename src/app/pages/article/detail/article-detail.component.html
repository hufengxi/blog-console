<div
  style="
    background: #fff;
    width: 100%;
    height: 100%;
    min-height: 500px;
    padding: 20px calc(50% - 606px);
  "
>
  <div
    style="height: 100%; width: 100%; border: 1px #eaeaea solid; padding: 20px"
  >
    <div style="font-size: 30px; line-height: 30px; margin-bottom: 20px">
      {{ articleItem?.title }}
    </div>
    <div>
      <markdown [data]="articleItem?.body"></markdown>
    </div>
  </div>
</div>
