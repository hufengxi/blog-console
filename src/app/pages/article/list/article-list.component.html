<div id="service-content">
  <div id="menu-content">
    <div
      class="xf-card"
      style="
        width: calc(100% - 192px);
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        position: fixed;
        top: 50px;
      "
    >
      <div class="xf-title-15">文章</div>
      <div>
        <d-button bsStyle="danger" bsSize="lg" (btnClick)="goCreateArticle()"
          >新建文章</d-button
        >
      </div>
    </div>

    <div style="width: 100%; height: 100%; padding: 90px 20px 20px">
      <div
        *ngFor="let item of tableInfo.srcData"
        style="background: #fff; padding: 20px; margin-bottom: 20px"
      >
        <div style="display: flex; justify-content: space-between">
          <!-- 文章标题 -->
          <div
            class="xf-overflow"
            style="
              max-width: 500px;
              font-size: 16px;
              font-weight: 500;
              color: #555666;
            "
          >
            {{ item.title }}
          </div>
          <!-- 更新时间 -->
          <div
            class="xf-overflow"
            style="max-width: 200px; color: #999; font-size: 14px"
          >
            {{ item.updateTime }}
          </div>
        </div>
        <div class="xf-mt-3x" style="display: flex; justify-content: flex-end">
          <!-- 操作 -->
          <span
            *ngFor="let action of actionMenus"
            (click)="action.click(item)"
            class="xf-inline-block xf-mr-2x xf-pointer"
          >
            {{ action.title }}
          </span>
        </div>
      </div>
      <d-pagination
        [size]="'sm'"
        [total]="pager.total"
        [(pageSize)]="pager.pageSize"
        [(pageIndex)]="pager.pageIndex"
        [pageSizeOptions]="pager.pageSizeOptions"
        (pageIndexChange)="pager.pageChange()"
        (pageSizeChange)="pager.pageChange()"
        [canViewTotal]="true"
        [canChangePageSize]="true"
        [canJumpPage]="true"
        [maxItems]="5"
        [autoHide]="true"
      >
      </d-pagination>
    </div>
  </div>
</div>
